<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bloch Sphere Visualizer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(to right, #020617, #0f172a);
  color: #ffffff;   /* fixed */
}

h1 {
  margin: 10px;
  color: #38bdf8;   /* nice heading color */
}

#controls {
  margin: 10px;
  padding: 15px;
  background: #1e40af;   /* blue */
  border-radius: 10px;
}

label {
  display: block;
  margin-top: 10px;
}

#info {
  margin-top: 10px;
  background: #1e293b;   /* dark card */
  padding: 10px;
  border-radius: 10px;
  width: 300px;
}

.bar {
  height: 20px;
  background: #22c55e;   /* green */
  margin: 5px 0;
  width: 0%;
  border-radius: 5px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  background: #f59e0b;   /* orange */
  color: black;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Bloch Sphere Visualizer</h1>

<div id="controls">
  <label>
    θ (Theta): <span id="thetaVal">0</span>
    <input type="range" id="theta" min="0" max="180" value="45">
  </label>

  <label>
    φ (Phi): <span id="phiVal">0</span>
    <input type="range" id="phi" min="0" max="360" value="45">
  </label>

  <button onclick="measure()">Measure</button>
</div>

<div id="info">
  <p id="state"></p>
  <p id="prob"></p>

  <div>P(0)</div>
  <div class="bar" id="bar0"></div>

  <div>P(1)</div>
  <div class="bar" id="bar1"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.7), 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight * 0.7);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

// 🌐 SPHERE (UNCHANGED as requested)
const geometry = new THREE.SphereGeometry(2, 32, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x808080, wireframe: true });
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// Axes
scene.add(new THREE.AxesHelper(3));

// Labels
function addLabel(text, position) {
  const canvas = document.createElement("canvas");
  const context = canvas.getContext("2d");
  context.font = "40px Arial";
  context.fillStyle = "#38bdf8";   // changed label color
  context.fillText(text, 0, 40);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(spriteMaterial);

  sprite.position.copy(position);
  sprite.scale.set(1.5, 0.7, 1);
  scene.add(sprite);
}

addLabel("|0⟩", new THREE.Vector3(0, 0, 2.3));
addLabel("|1⟩", new THREE.Vector3(0, 0, -2.3));

// Arrow
let arrow;
const origin = new THREE.Vector3(0, 0, 0);

// Controls
const thetaSlider = document.getElementById("theta");
const phiSlider = document.getElementById("phi");

const thetaVal = document.getElementById("thetaVal");
const phiVal = document.getElementById("phiVal");

const stateText = document.getElementById("state");
const probText = document.getElementById("prob");

function update() {
  let thetaDeg = parseFloat(thetaSlider.value);
  let phiDeg = parseFloat(phiSlider.value);

  let theta = thetaDeg * Math.PI / 180;
  let phi = phiDeg * Math.PI / 180;

  thetaVal.innerText = thetaDeg;
  phiVal.innerText = phiDeg;

  let x = Math.sin(theta) * Math.cos(phi);
  let y = Math.sin(theta) * Math.sin(phi);
  let z = Math.cos(theta);

  let dir = new THREE.Vector3(x, y, z).normalize();

  if (arrow) scene.remove(arrow);

  // 🟡 UPDATED ARROW COLOR
  arrow = new THREE.ArrowHelper(dir, origin, 2, 0xffff00);
  scene.add(arrow);

  let a = Math.cos(theta / 2);
  let b_real = Math.cos(phi) * Math.sin(theta / 2);
  let b_imag = Math.sin(phi) * Math.sin(theta / 2);

  let prob0 = a * a;
  let prob1 = b_real*b_real + b_imag*b_imag;

  stateText.innerHTML =
    `|ψ⟩ = ${a.toFixed(3)}|0⟩ + (${b_real.toFixed(3)} + ${b_imag.toFixed(3)}i)|1⟩`;

  probText.innerHTML =
    `P(0) = ${prob0.toFixed(3)}, P(1) = ${prob1.toFixed(3)}`;

  document.getElementById("bar0").style.width = (prob0 * 100) + "%";
  document.getElementById("bar1").style.width = (prob1 * 100) + "%";
}

// Measurement
function measure() {
  let theta = thetaSlider.value * Math.PI / 180;
  let prob0 = Math.cos(theta / 2) ** 2;

  let result = Math.random() < prob0 ? "|0⟩" : "|1⟩";
  alert("Measured: " + result);
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  sphere.rotation.y += 0.003;

  renderer.render(scene, camera);
}

// Init
thetaSlider.addEventListener("input", update);
phiSlider.addEventListener("input", update);

update();
animate();
</script>

</body>
</html>
